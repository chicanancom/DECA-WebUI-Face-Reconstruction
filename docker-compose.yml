version: '3.8'

services:
  deca-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deca-web-app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/web/uploads
      - /app/web/outputs
    # --- GPU CONFIGURATION (Comment out the block below if the server has NO GPU) ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # --------------------------------------------------------------------------------
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - USE_CPU_ONLY=0 # Set to 1 to force CPU even if GPU is present
    restart: unless-stopped
